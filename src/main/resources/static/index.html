<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bistro Dev Console</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 24px;
    }

    h1 { font-size: 1.3rem; margin-bottom: 24px; color: #444; }
    h2 { font-size: 1rem; margin-bottom: 12px; color: #555; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 16px;
      max-width: 1000px;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }

    .card.full { grid-column: 1 / -1; }

    button {
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      cursor: pointer;
      font-size: .9rem;
    }
    button:hover { background: #1d4ed8; }
    button.secondary {
      background: #e5e7eb;
      color: #374151;
    }
    button.secondary:hover { background: #d1d5db; }
    button.danger { background: #ef4444; }
    button.danger:hover { background: #dc2626; }

    input, select {
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: .9rem;
      width: 100%;
    }
    input:focus, select:focus { outline: 2px solid #2563eb; border-color: transparent; }

    label { display: block; font-size: .8rem; color: #6b7280; margin-bottom: 4px; margin-top: 10px; }
    label:first-child { margin-top: 0; }

    .row { display: flex; gap: 8px; align-items: flex-end; margin-top: 8px; }
    .row input { flex: 1; }

    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    th { text-align: left; padding: 6px 8px; border-bottom: 2px solid #e5e7eb; color: #6b7280; font-weight: 600; }
    td { padding: 6px 8px; border-bottom: 1px solid #f3f4f6; }
    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: .75rem;
      font-weight: 600;
      background: #dbeafe;
      color: #1e40af;
    }

    .error { color: #dc2626; font-size: .85rem; margin-top: 8px; }
    .empty { color: #9ca3af; font-size: .85rem; }

    .receipt {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 12px;
      font-family: monospace;
      font-size: .85rem;
      white-space: pre-wrap;
      margin-top: 10px;
    }

    .order-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
    .order-meta span { font-size: .85rem; color: #6b7280; }
    .order-meta strong { color: #222; }

    .totals { text-align: right; margin-top: 8px; font-size: .9rem; }
    .totals .total { font-size: 1rem; font-weight: 700; color: #111; }

    .actions { display: flex; gap: 8px; margin-top: 14px; }

    #items-container .item-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    #items-container .item-row input { flex: 1; }
  </style>
</head>
<body>

<h1>Bistro Dev Console</h1>

<div class="grid">

  <!-- Products -->
  <div class="card">
    <h2>Products</h2>
    <div class="actions">
      <button onclick="loadProducts()">Load all</button>
      <div style="flex:1; display:flex; gap:8px;">
        <input id="product-id" type="number" placeholder="ID" style="width:80px">
        <button class="secondary" onclick="loadProduct()">Get by ID</button>
      </div>
    </div>
    <div id="products-result" style="margin-top:12px"></div>
  </div>

  <!-- Get Order -->
  <div class="card">
    <h2>Get Order</h2>
    <div class="actions">
      <input id="order-id" type="number" placeholder="Order ID">
      <button onclick="loadOrder()">Fetch</button>
    </div>
    <div id="order-result" style="margin-top:12px"></div>
  </div>

  <!-- Place Order -->
  <div class="card full">
    <h2>Place Order</h2>
    <div style="display:flex; gap:24px; flex-wrap:wrap;">
      <div style="flex:0 0 120px;">
        <label>Table number</label>
        <input id="table-number" type="number" placeholder="5">
      </div>
      <div style="flex:1; min-width:280px;">
        <label>Items</label>
        <div id="items-container">
          <div class="item-row">
            <input type="number" placeholder="Product ID" class="product-id-input">
            <input type="number" placeholder="Qty" min="1" value="1" class="quantity-input" style="width:70px; flex:none;">
            <button class="danger" onclick="removeItem(this)" style="flex:none;">✕</button>
          </div>
        </div>
        <button class="secondary" onclick="addItem()" style="margin-top:8px; font-size:.8rem; padding:5px 10px;">+ Add item</button>
      </div>
      <div style="align-self:flex-end;">
        <button onclick="placeOrder()">Place order</button>
      </div>
    </div>
    <div id="place-order-result" style="margin-top:12px"></div>
  </div>

</div>

<script>
  const BASE = '';

  async function api(method, path, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(BASE + path, opts);
    const text = await res.text();
    const data = text ? JSON.parse(text) : null;
    if (!res.ok) throw { status: res.status, data };
    return data;
  }

  function renderError(err) {
    const msg = err?.data?.message ?? `HTTP ${err?.status ?? 'error'}`;
    return `<div class="error">⚠ ${msg}</div>`;
  }

  // ── Products ──────────────────────────────────────────────

  async function loadProducts() {
    const el = document.getElementById('products-result');
    el.innerHTML = '<span class="empty">Loading…</span>';
    try {
      const products = await api('GET', '/products');
      el.innerHTML = products.length === 0
        ? '<span class="empty">No products found.</span>'
        : renderProductTable(products);
    } catch (e) { el.innerHTML = renderError(e); }
  }

  async function loadProduct() {
    const id = document.getElementById('product-id').value;
    if (!id) return;
    const el = document.getElementById('products-result');
    el.innerHTML = '<span class="empty">Loading…</span>';
    try {
      const p = await api('GET', `/products/${id}`);
      el.innerHTML = renderProductTable([p]);
    } catch (e) { el.innerHTML = renderError(e); }
  }

  function renderProductTable(products) {
    const rows = products.map(p => `
      <tr>
        <td>${p.id}</td>
        <td>${p.name}</td>
        <td>€${Number(p.price).toFixed(2)}</td>
        <td><span class="badge">${p.category}</span></td>
      </tr>`).join('');
    return `<table>
      <thead><tr><th>ID</th><th>Name</th><th>Price</th><th>Category</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  // ── Orders ────────────────────────────────────────────────

  async function loadOrder() {
    const id = document.getElementById('order-id').value;
    if (!id) return;
    const el = document.getElementById('order-result');
    el.innerHTML = '<span class="empty">Loading…</span>';
    try {
      const order = await api('GET', `/orders/${id}`);
      el.innerHTML = renderOrder(order);
    } catch (e) { el.innerHTML = renderError(e); }
  }

  async function placeOrder() {
    const tableNumber = parseInt(document.getElementById('table-number').value);
    const rows = document.querySelectorAll('#items-container .item-row');
    const items = [...rows].map(row => ({
      productId: parseInt(row.querySelector('.product-id-input').value),
      quantity:  parseInt(row.querySelector('.quantity-input').value)
    })).filter(i => i.productId && i.quantity);

    const el = document.getElementById('place-order-result');
    el.innerHTML = '';
    try {
      const order = await api('POST', '/orders', { tableNumber, items });
      document.getElementById('order-id').value = order.id;
      el.innerHTML = renderOrder(order);
    } catch (e) { el.innerHTML = renderError(e); }
  }

  function renderOrder(o) {
    const itemRows = (o.items ?? []).map(i => `
      <tr>
        <td>${i.productName}</td>
        <td>${i.quantity}</td>
        <td>€${Number(i.unitPrice).toFixed(2)}</td>
        <td>€${(i.quantity * i.unitPrice).toFixed(2)}</td>
      </tr>`).join('');

    const discountRows = (o.discounts ?? []).map(d =>
      `<div>− ${d.description}: €${Number(d.amount).toFixed(2)}</div>`).join('');

    return `
      <div class="order-meta">
        <span>Order <strong>#${o.id}</strong></span>
        <span>Table <strong>${o.tableNumber}</strong></span>
        <span>${new Date(o.orderTime).toLocaleString()}</span>
      </div>
      <table>
        <thead><tr><th>Product</th><th>Qty</th><th>Unit price</th><th>Line total</th></tr></thead>
        <tbody>${itemRows}</tbody>
      </table>
      <div class="totals">
        <div>Subtotal: €${Number(o.subtotal).toFixed(2)}</div>
        ${discountRows}
        <div class="total">Total: €${Number(o.total).toFixed(2)}</div>
      </div>
      ${o.receipt ? `<div class="receipt">${o.receipt}</div>` : ''}`;
  }

  // ── Item rows ─────────────────────────────────────────────

  function addItem() {
    const container = document.getElementById('items-container');
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <input type="number" placeholder="Product ID" class="product-id-input">
      <input type="number" placeholder="Qty" min="1" value="1" class="quantity-input" style="width:70px; flex:none;">
      <button class="danger" onclick="removeItem(this)" style="flex:none;">✕</button>`;
    container.appendChild(row);
  }

  function removeItem(btn) {
    const rows = document.querySelectorAll('#items-container .item-row');
    if (rows.length > 1) btn.closest('.item-row').remove();
  }
</script>
</body>
</html>
